<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="球球大冒險 – 手機電腦都能暢玩的樓梯跳躍遊戲">
  <title>球球大冒險</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { height:100%; overscroll-behavior:none; }
    body {
      width:100%; height:100%; background:#080818;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden; user-select:none; -webkit-user-select:none; touch-action:none;
    }
    #wrapper { position:relative; line-height:0; }
    #gc { display:block; touch-action:none; }

    /* ── Touch Buttons ── */
    .tbtn {
      position:absolute; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-weight:bold; color:rgba(255,255,255,0.92);
      text-shadow:0 1px 4px rgba(0,0,0,0.9);
      opacity:0.62; background:rgba(255,255,255,0.10);
      border:2.5px solid rgba(255,255,255,0.32);
      transition:opacity .06s, background .06s;
      touch-action:none; -webkit-tap-highlight-color:transparent; cursor:pointer;
    }
    .tbtn.pressed { opacity:1; border-width: 5px !important; }
    #tb-left  { background:rgba(60,140,255,0.18); border-color:rgba(80,160,255,0.55); }
    #tb-right { background:rgba(60,140,255,0.18); border-color:rgba(80,160,255,0.55); }
    #tb-up    { background:rgba(255,195,0,0.18);  border-color:rgba(255,210,0,0.65);  }
    #tb-down  { background:rgba(255,70,70,0.18);  border-color:rgba(255,90,90,0.65);  }
    
    #tb-left.pressed  { border-color: rgba(40,100,220,0.95) !important; background: rgba(60,140,255,0.35) !important; }
    #tb-right.pressed { border-color: rgba(40,100,220,0.95) !important; background: rgba(60,140,255,0.35) !important; }
    #tb-up.pressed    { border-color: rgba(220,160,0,0.95) !important;  background: rgba(255,195,0,0.35) !important; }
    #tb-down.pressed  { border-color: rgba(220,40,40,0.95) !important;  background: rgba(255,70,70,0.35) !important; }

    @keyframes flash-white {
      0% {
        background-color: rgba(255, 255, 255, 1) !important;
        border-color: rgba(255, 255, 255, 1) !important;
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.8) !important;
        opacity: 1 !important;
      }
      100% {
        /* returns to original styling */
      }
    }
    .flash-active {
      animation: flash-white 0.2s ease-out;
    }

    @keyframes red-yellow-gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes text-size-pulse {
      0%, 100% { transform: scale(1);    }
      50%      { transform: scale(1.23); }
    }
    .record-glow {
      background: linear-gradient(90deg, #ff3333, #ffff33, #ff3333, #ffff33);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent !important;
      animation: red-yellow-gradient 1.5s ease infinite, text-size-pulse 1.5s ease-in-out infinite;
      font-weight: bold;
      font-size: 13px;
      filter: drop-shadow(0 0 5px rgba(255, 100, 0, 0.8));
      width: max-content;
      display: inline-block;
      transform-origin: left center;
    }


    /* ── Time Limit Dialog ── */
    #time-limit-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 10, 25, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center; justify-content: center;
      z-index: 9999;
      font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    }
    .dialog-card {
      background: rgba(30, 30, 45, 0.95);
      border: 2px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      border-radius: 16px;
      padding: 24px;
      width: 85%;
      max-width: 360px;
      text-align: center;
      color: #fff;
    }
    .dialog-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 18px;
      color: #ffb703;
      text-shadow: 0 0 8px rgba(255, 183, 3, 0.3);
    }
    .dialog-input {
      width: 100%;
      padding: 10px 14px;
      font-size: 16px;
      border-radius: 8px;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      text-align: center;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.2s;
    }
    .dialog-input:focus {
      border-color: #ffb703;
    }
    .dialog-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .dialog-btn {
      flex: 1;
      padding: 10px 16px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: transform 0.05s, opacity 0.1s;
    }
    .dialog-btn:active {
      transform: scale(0.96);
    }
    .btn-confirm {
      background: #4cc9f0;
      color: #000;
    }
    .btn-leave {
      background: #f72585;
      color: #fff;
    }
    .score-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(10, 10, 25, 0.05);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center; justify-content: center;
      z-index: 9999;
      font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
    }
  </style>
</head>
<body>
<div id="wrapper">
  <canvas id="gc" tabindex="0"></canvas>
  <div class="tbtn" id="tb-left">◀</div>
  <div class="tbtn" id="tb-right">▶</div>
  <div class="tbtn" id="tb-up">▲</div>
  <div class="tbtn" id="tb-down">▼</div>

  <!-- Time Limit Overlay -->
  <div id="time-limit-overlay">
    <div class="dialog-card">
      <div class="dialog-title">時間到囉！</div>
      <input type="text" id="time-limit-input" class="dialog-input" placeholder="請輸入解鎖密碼" pattern="\d*">
      <div class="dialog-buttons">
        <button id="time-limit-confirm" class="dialog-btn btn-confirm">確認</button>
        <button id="time-limit-leave" class="dialog-btn btn-leave">離開</button>
      </div>
    </div>
  </div>
  <!-- Score Recording Overlays -->
  <div id="score-prompt-overlay" class="score-overlay">
    <div class="dialog-card">
      <div class="dialog-title">是否記錄分數？</div>
      <div class="dialog-buttons">
        <button id="score-prompt-yes" class="dialog-btn btn-confirm">是</button>
        <button id="score-prompt-no" class="dialog-btn btn-leave">否</button>
      </div>
    </div>
  </div>

  <div id="score-input-overlay" class="score-overlay">
    <div class="dialog-card">
      <div class="dialog-title">請輸入ID</div>
      <input type="text" id="score-input-text" class="dialog-input" maxlength="16" placeholder="輸入ID">
      <div class="dialog-buttons">
        <button id="score-input-confirm" class="dialog-btn btn-confirm">確認</button>
      </div>
    </div>
  </div>

  <div id="score-rank-overlay" class="score-overlay" style="align-items: flex-start; justify-content: center; padding-top: 30px;">
    <div class="dialog-card" id="score-rank-card" style="max-height: 80vh; display: flex; flex-direction: column; overflow: hidden;">
      <div class="dialog-title" style="color: #ffffff; flex-shrink: 0; font-weight: bold;
           text-shadow:
             0 0 2px #000, 1px 0 2px #000, -1px 0 2px #000, 0 1px 2px #000, 0 -1px 2px #000,
             1px 1px 2px #000, -1px 1px 2px #000, 1px -1px 2px #000, -1px -1px 2px #000,
             0 0 3px #fff, 1px 0 3px #fff, -1px 0 3px #fff, 0 1px 3px #fff, 0 -1px 3px #fff,
             1px 1px 3px #fff, -1px 1px 3px #fff, 1px -1px 3px #fff, -1px -1px 3px #fff;"
           id="score-rank-title">本次排名: </div>
      <div id="score-rank-list" style="flex: 1; overflow-y: auto; overflow-x: auto; font-size: 14px; line-height: 2.0; text-align: left; padding-left: 20px; white-space: nowrap; padding-bottom: 10px; margin-bottom: 0;">
      </div>
      <div class="dialog-buttons" style="flex-shrink: 0; margin-top: 12px;">
        <button id="score-rank-continue" class="dialog-btn btn-confirm">繼續</button>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

/* ═══════════════════════ iOS ZOOM PREVENTION ═══════════════════════ */
// 阻止 iOS Safari 的 gesture 縮放（pinch / triple-tap zoom）
document.addEventListener('gesturestart',  function(e){ e.preventDefault(); }, { passive: false });
document.addEventListener('gesturechange', function(e){ e.preventDefault(); }, { passive: false });
document.addEventListener('gestureend',    function(e){ e.preventDefault(); }, { passive: false });
// 阻止多點觸控（2 支手指以上）觸發的縮放；單點觸控正常通過
document.addEventListener('touchstart', function(e){
  if(e.touches.length > 1){ e.preventDefault(); }
}, { passive: false });
document.addEventListener('touchmove', function(e){
  if(e.touches.length > 1){ e.preventDefault(); }
}, { passive: false });
// 阻止快速雙擊 / 三連點縮放（iOS 專屬）
let _lastTap = 0;
document.addEventListener('touchend', function(e){
  const now = Date.now();
  if(now - _lastTap < 300){ e.preventDefault(); }
  _lastTap = now;
}, { passive: false });


/* ═══════════════════════ CONSTANTS ═══════════════════════ */
const GW=480, GH=640;
const GRAVITY=0.5, PLAYER_SPEED=5, MAX_FALL=10;
const PLAT_SPEED=2, SPAWN_RATE=60;

/* ═══════════════════════ CANVAS ═══════════════════════ */
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
canvas.width = GW; canvas.height = GH;
const wrapper = document.getElementById('wrapper');
let CS = 1; // canvasScale
let layoutMode = 0; // 切換方向鍵配置模式 (0-9)
let useGesture = false; // 使用手勢

function resize() {
  CS = Math.min(window.innerWidth/GW, window.innerHeight/GH);
  const cw=Math.floor(GW*CS), ch=Math.floor(GH*CS);
  canvas.style.width=cw+'px'; canvas.style.height=ch+'px';
  wrapper.style.width=cw+'px'; wrapper.style.height=ch+'px';
  layoutBtns(cw,ch);
}
function layoutBtns(cw,ch) {
  const bw=Math.round(68*1.1*CS), bh=Math.round(68*1.1*CS);
  const mg=Math.round(8*CS),  bt=Math.round(14*CS), sp=Math.round(10*1.1*CS);
  const fs=Math.round(22*1.1*CS)+'px';
  function pos(id,l,r,b){
    const el=document.getElementById(id);
    el.style.cssText+=`;width:${bw}px;height:${bh}px;font-size:${fs};`+
      `left:${l!=null?l+'px':'auto'};right:${r!=null?r+'px':'auto'};bottom:${b}px;top:auto;display:${useGesture?'none':'flex'}`;
  }
  if (layoutMode === 0) {
    pos('tb-left',  null, mg+bw+sp, bt);
    pos('tb-right', null, mg,       bt);
    pos('tb-up',    mg,       null, bt);
    pos('tb-down',  mg+bw+sp, null, bt);
  } else if (layoutMode === 1) {
    pos('tb-up',    null, mg+bw+sp, bt);
    pos('tb-down',  null, mg,       bt);
    pos('tb-left',  mg,       null, bt);
    pos('tb-right', mg+bw+sp, null, bt);
  } else if (layoutMode === 2) {
    // 1. 在底部左邊: 方向鍵依序為”左/下/右”, 並且在同一列; 在底部右邊: 方向鍵”上”, 與其他方向鍵在同一列
    pos('tb-left',  mg,             null, bt);
    pos('tb-down',  mg + bw + sp,   null, bt);
    pos('tb-right', mg + 2*(bw+sp), null, bt);
    pos('tb-up',    null,           mg,   bt);
  } else if (layoutMode === 3) {
    // 2. 在底部右邊: 方向鍵依序為”左/下/右”, 並且在同一列; 在底部左邊: 方向鍵”上”, 與其他方向鍵在同一列
    pos('tb-left',  null,           mg + 2*(bw+sp), bt);
    pos('tb-down',  null,           mg + bw + sp,   bt);
    pos('tb-right', null,           mg,             bt);
    pos('tb-up',    mg,             null,           bt);
  } else if (layoutMode === 4) {
    // 3. 在底部左邊: 分成3列顯示方向鍵 (第一列: 上, 第二列: 左 右, 第三列: 下) — 間距縮小50%
    const sp4 = Math.round(sp * 0.5);
    pos('tb-up',    mg + bw + sp4,   null, bt + 2*(bh+sp4));
    pos('tb-left',  mg,              null, bt + bh + sp4);
    pos('tb-right', mg + 2*(bw+sp4), null, bt + bh + sp4);
    pos('tb-down',  mg + bw + sp4,   null, bt);
  } else if (layoutMode === 5) {
    // 4. 在底部右邊: 分成3列顯示方向鍵 (第一列: 上, 第二列: 左 右, 第三列: 下) — 間距縮小50%
    const sp5 = Math.round(sp * 0.5);
    pos('tb-up',    null,            mg + bw + sp5,    bt + 2*(bh+sp5));
    pos('tb-left',  null,            mg + 2*(bw+sp5),  bt + bh + sp5);
    pos('tb-right', null,            mg,               bt + bh + sp5);
    pos('tb-down',  null,            mg + bw + sp5,    bt);
  } else if (layoutMode === 6) {
    // 5. 在底部左邊: 方向鍵依序為"左/右/下", 並且在同一列; 在底部右邊: 方向鍵"上", 與其他方向鍵在同一列
    pos('tb-left',  mg,             null, bt);
    pos('tb-right', mg + bw + sp,   null, bt);
    pos('tb-down',  mg + 2*(bw+sp), null, bt);
    pos('tb-up',    null,           mg,   bt);
  } else if (layoutMode === 7) {
    // 6. 在底部右邊: 方向鍵依序為"左/右/下", 並且在同一列; 在底部左邊: 方向鍵"上", 與其他方向鍵在同一列
    pos('tb-left',  null,           mg + 2*(bw+sp), bt);
    pos('tb-right', null,           mg + bw + sp,   bt);
    pos('tb-down',  null,           mg,             bt);
    pos('tb-up',    mg,             null,           bt);
  } else if (layoutMode === 8) {
    // 7. 在底部左邊: 方向鍵依序為"左/右/上", 並且在同一列; 在底部右邊: 方向鍵"下", 與其他方向鍵在同一列
    pos('tb-left',  mg,             null, bt);
    pos('tb-right', mg + bw + sp,   null, bt);
    pos('tb-up',    mg + 2*(bw+sp), null, bt);
    pos('tb-down',  null,           mg,   bt);
  } else if (layoutMode === 9) {
    // 8. 在底部右邊: 方向鍵依序為"左/右/上", 並且在同一列; 在底部左邊: 方向鍵"下", 與其他方向鍵在同一列
    pos('tb-left',  null,           mg + 2*(bw+sp), bt);
    pos('tb-right', null,           mg + bw + sp,   bt);
    pos('tb-up',    null,           mg,             bt);
    pos('tb-down',  mg,             null,           bt);
  }
}
window.addEventListener('resize', resize);
resize();

/* ═══════════════════════ BACKGROUND IMAGE ═══════════════════════ */
let bgImg=null, bgImgRainbow9=null, bgX=0;
const _bi=new Image();
_bi.onload=()=>{ bgImg=_bi; };
_bi.onerror=()=>{ bgImg=null; };
_bi.src='./GPT_background_rainbow0.png';
const _bi9=new Image();
_bi9.onload=()=>{ bgImgRainbow9=_bi9; };
_bi9.onerror=()=>{ bgImgRainbow9=null; };
_bi9.src='./GPT_background_rainbow9.png';
const BG_SPEED=0.5;

/* ═══════════════════════ AUDIO ═══════════════════════ */
let AC; try{ AC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){}
function mkBuf(fn,dur){
  if(!AC)return null;
  const sr=AC.sampleRate, n=Math.floor(sr*dur);
  const b=AC.createBuffer(1,n,sr); fn(b.getChannelData(0),sr,n); return b;
}
function playBuf(buf){
  if(!AC||!buf)return;
  if(AC.state==='suspended')AC.resume();
  const s=AC.createBufferSource(); s.buffer=buf; s.connect(AC.destination); s.start();
}
// 可指定音量版本：透過 GainNode 控制音量
function playBufGain(buf,gain){
  if(!AC||!buf)return;
  if(AC.state==='suspended')AC.resume();
  const s=AC.createBufferSource(); s.buffer=buf;
  const g=AC.createGain(); g.gain.value=gain;
  s.connect(g); g.connect(AC.destination); s.start();
}
const SFX={};
function initSounds(){
  if(SFX.ready)return; SFX.ready=true;
  SFX.coin=mkBuf((d,sr,n)=>{
    let ph=0;
    for(let i=0;i<n;i++){const t=i/sr,f=880+880*i/n;ph+=2*Math.PI*f/sr;d[i]=Math.sin(ph)*Math.exp(-t*18)*0.85;}
  },0.12);
  SFX.damage=mkBuf((d,sr,n)=>{
    let ph=0;
    for(let i=0;i<n;i++){const t=i/sr;ph+=2*Math.PI*110/sr;d[i]=(Math.sin(ph)*0.5+(Math.random()-.5))*Math.exp(-t*14)*0.88;}
  },0.22);
  SFX.heal=mkBuf((d,sr,n)=>{
    const fr=[261,329,392,523],nl=Math.floor(n/4);
    fr.forEach((f,fi)=>{let ph=0;const s=fi*nl,e=Math.min(s+nl,n);for(let i=s;i<e;i++){const t=(i-s)/sr;ph+=2*Math.PI*f/sr;d[i]=Math.sin(ph)*Math.exp(-t*8)*0.75;}});
  },0.55);
  SFX.gameover=mkBuf((d,sr,n)=>{
    const fr=[392,349,330,294,262],nl=Math.floor(sr*0.35);
    fr.forEach((f,fi)=>{let ph=0;const s=fi*nl,e=Math.min(s+nl,n);for(let i=s;i<e;i++){const t=(i-s)/sr;ph+=2*Math.PI*f/sr;d[i]=Math.sin(ph)*Math.exp(-t*4)*0.70;}});
  },1.75);
  SFX.boost=mkBuf((d,sr,n)=>{
    let ph=0;
    for(let i=0;i<n;i++){const t=i/sr,f=300+1200*Math.pow(i/n,1.8);ph+=2*Math.PI*f/sr;d[i]=Math.sin(ph)*Math.exp(-t*12)*0.65;}
  },0.15);
  // 滴答聲：短促的雙擊音（高頻「滴」+ 略低「答」）
  SFX.tick=mkBuf((d,sr,n)=>{
    // 「滴」: 1200Hz 前半段
    const half=Math.floor(n/2);
    let ph=0;
    for(let i=0;i<half;i++){const t=i/sr;ph+=2*Math.PI*1200/sr;d[i]=Math.sin(ph)*Math.exp(-t*60)*0.55;}
    // 「答」: 900Hz 後半段
    ph=0;
    for(let i=half;i<n;i++){const t=(i-half)/sr;ph+=2*Math.PI*900/sr;d[i]=Math.sin(ph)*Math.exp(-t*60)*0.40;}
  },0.08);
}

/* ═══════════════════════ UTILITIES ═══════════════════════ */
function hsl2rgb(h,s,l){
  s/=100;l/=100;const k=n=>(n+h/30)%12,a=s*Math.min(l,1-l),f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return[Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];
}
function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

/* Piano lacquer outlined text (double strokeText → fill) */
function drawOutlined(text,font,body,cx,cy,l1w,l2w,c1='#fff',c2='#000',alpha=1,l3w=0,c3='#000',align='center'){
  ctx.save();
  ctx.globalAlpha=alpha; ctx.font=font; ctx.textAlign=align; ctx.textBaseline='middle'; ctx.lineJoin='round';
  if (l3w > 0) { ctx.strokeStyle=c3; ctx.lineWidth=l3w; ctx.strokeText(text,cx,cy); }
  ctx.strokeStyle=c2; ctx.lineWidth=l2w; ctx.strokeText(text,cx,cy);
  ctx.strokeStyle=c1; ctx.lineWidth=l1w; ctx.strokeText(text,cx,cy);
  if(Array.isArray(body)&&Array.isArray(body[0])){
    const sz=parseInt(font.match(/(\d+)px/)?.[1]??48);
    const gr=ctx.createLinearGradient(cx,cy-sz*.6,cx,cy+sz*.6);
    body.forEach((c,i)=>gr.addColorStop(i/(body.length-1),`rgb(${c[0]},${c[1]},${c[2]})`));
    ctx.fillStyle=gr;
  } else ctx.fillStyle=typeof body==='string'?body:`rgb(${body[0]},${body[1]},${body[2]})`;
  ctx.globalAlpha=alpha; ctx.fillText(text,cx,cy); ctx.restore();
}

/* ── Star Rating Display ── */
// 在畫布上以深黃色立體星星（含白光閃爍）顯示評等，最高5顆
function drawStarRating(cx, cy, rating, alpha=1) {
  const TOTAL = 5;
  const R = 20;          // 星星外圍半徑
  const r = 9;           // 星星內圈半徑
  const gap = 52;        // 星星間距
  const startX = cx - ((TOTAL - 1) * gap) / 2;
  const pulse = 0.55 + 0.45 * Math.abs(Math.sin(frameCount * 0.06)); // 0.55~1.0 脈衝

  // ── 星形路徑輔助 ──
  function starPath(sx, sy, outerR, innerR) {
    ctx.beginPath();
    for (let p = 0; p < 10; p++) {
      const angle = (Math.PI / 5) * p - Math.PI / 2;
      const rad = (p % 2 === 0) ? outerR : innerR;
      const px = sx + Math.cos(angle) * rad;
      const py = sy + Math.sin(angle) * rad;
      p === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
  }

  for (let i = 0; i < TOTAL; i++) {
    const sx = startX + i * gap;
    const active = (i < rating);

    ctx.save();
    ctx.globalAlpha = alpha;

    if (active) {
      /* ①  外部輝光（脈衝閃爍） */
      const glowR = R + 10;
      const grd = ctx.createRadialGradient(sx, cy, R * 0.2, sx, cy, glowR * 1.8);
      grd.addColorStop(0,    `rgba(255,255,180,${0.8  * pulse})`);
      grd.addColorStop(0.35, `rgba(255,220,80,${0.45 * pulse})`);
      grd.addColorStop(1,    'rgba(255,200,0,0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(sx, cy, glowR * 1.8, 0, Math.PI * 2);
      ctx.fill();

      /* ②  暗色落影（立體感） */
      ctx.shadowColor   = 'rgba(80,40,0,0.75)';
      ctx.shadowBlur    = 6;
      ctx.shadowOffsetX = 2;
      ctx.shadowOffsetY = 3;
      starPath(sx, cy, R, r);
      ctx.fillStyle = '#7a4800';
      ctx.fill();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;

      /* ③  主體漸層（上亮下暗，垂直方向模擬球面光） */
      starPath(sx, cy, R, r);
      const bodyGr = ctx.createLinearGradient(sx, cy - R, sx, cy + R);
      bodyGr.addColorStop(0,    '#FFF176');  // 頂部亮黃
      bodyGr.addColorStop(0.28, '#FFD700');  // 金黃
      bodyGr.addColorStop(0.65, '#C89000');  // 中深
      bodyGr.addColorStop(1,    '#7A5000');  // 底部暗褐
      ctx.fillStyle = bodyGr;
      ctx.fill();

      /* ④  側邊高光（從左上到右下的斜向漸層，模擬 rim light） */
      starPath(sx, cy, R, r);
      const rimGr = ctx.createLinearGradient(sx - R, cy - R, sx + R, cy + R);
      rimGr.addColorStop(0,   'rgba(255,255,220,0.55)');
      rimGr.addColorStop(0.4, 'rgba(255,220,80,0.15)');
      rimGr.addColorStop(1,   'rgba(100,60,0,0.0)');
      ctx.fillStyle = rimGr;
      ctx.fill();

      /* ⑤  深色輪廓線 */
      starPath(sx, cy, R, r);
      ctx.strokeStyle = '#6B4200';
      ctx.lineWidth   = 1.8;
      ctx.lineJoin    = 'round';
      ctx.stroke();

      /* ⑥  頂部小圓形鏡面反光（specular glint） */
      const specX = sx - R * 0.22;
      const specY = cy - R * 0.42;
      const specGr = ctx.createRadialGradient(specX, specY, 0, specX, specY, R * 0.45);
      specGr.addColorStop(0,   `rgba(255,255,255,${0.82 * pulse})`);
      specGr.addColorStop(0.5, `rgba(255,255,200,${0.25 * pulse})`);
      specGr.addColorStop(1,   'rgba(255,255,255,0)');
      // 剪裁至星形內部
      ctx.save();
      starPath(sx, cy, R, r);
      ctx.clip();
      ctx.fillStyle = specGr;
      ctx.beginPath();
      ctx.arc(specX, specY, R * 0.45, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

    } else {
      /* ──  鐵灰色（未激活）同樣做輕微立體感 ── */
      /* 落影 */
      ctx.shadowColor = 'rgba(0,0,0,0.4)';
      ctx.shadowBlur = 4; ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 2;
      starPath(sx, cy, R, r);
      ctx.fillStyle = '#333';
      ctx.fill();
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
      /* 主體 */
      starPath(sx, cy, R, r);
      const grayGr = ctx.createLinearGradient(sx, cy - R, sx, cy + R);
      grayGr.addColorStop(0,   '#888');
      grayGr.addColorStop(0.5, '#555');
      grayGr.addColorStop(1,   '#2a2a2a');
      ctx.fillStyle = grayGr;
      ctx.fill();
      /* 輪廓 */
      starPath(sx, cy, R, r);
      ctx.strokeStyle = '#222';
      ctx.lineWidth = 1.4;
      ctx.lineJoin = 'round';
      ctx.stroke();
    }

    ctx.restore();
  }
}

/* Piano lacquer score text (red body + gloss) */
// blackMode: 字本體黑色、第二層外框也為黑色（用於額外加分倒數計時）
function drawScoreTxt(text,font,cx,cy,l1w,l2w,oA=1,fly=false,bA=1,blackMode=false){
  const bc=blackMode?'rgb(0,0,0)':fly?'rgb(0,100,0)':'rgb(210,20,20)';
  const gc=blackMode?`rgba(60,60,60,${0.35*bA})`:fly?`rgba(140,255,140,${0.35*bA})`:`rgba(255,140,140,${0.35*bA})`;
  const outline2=blackMode?'#000':'#000'; // 第二層外框（blackMode 同樣為黑色）
  ctx.save();
  ctx.font=font; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.lineJoin='round';
  ctx.globalAlpha=oA;
  ctx.strokeStyle=outline2; ctx.lineWidth=l2w; ctx.strokeText(text,cx,cy);
  ctx.strokeStyle='#fff'; ctx.lineWidth=l1w; ctx.strokeText(text,cx,cy);
  ctx.globalAlpha=bA; ctx.fillStyle=bc; ctx.fillText(text,cx,cy);
  ctx.fillStyle=gc; ctx.fillText(text,cx,cy-1);
  ctx.restore();
}

/* 3-D Button */
function drawBtn(x,y,w,h,rgb,text,font,tc='#000',r=8,pressed=false){
  ctx.save();
  const sh=pressed?0:4;
  const isGrad = Array.isArray(rgb[0]);
  const cTop = isGrad ? rgb[0] : rgb;
  const cBot = isGrad ? rgb[rgb.length-1] : rgb;

  rrect(x+sh,y+sh,w,h,r);
  ctx.fillStyle=`rgb(${Math.max(0,cBot[0]-60)},${Math.max(0,cBot[1]-60)},${Math.max(0,cBot[2]-60)})`; ctx.fill();
  const fx=pressed?x+2:x, fy=pressed?y+2:y;
  rrect(fx,fy,w,h,r);
  if (isGrad) {
    const gr = ctx.createLinearGradient(fx, fy, fx, fy + h);
    rgb.forEach((c, i) => gr.addColorStop(i / (rgb.length - 1), `rgb(${c[0]},${c[1]},${c[2]})`));
    ctx.fillStyle = gr;
  } else {
    ctx.fillStyle=`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
  }
  ctx.fill();
  rrect(fx+3,fy+3,w-6,Math.max(1,Math.floor(h/3)),r);
  ctx.fillStyle=`rgba(${Math.min(255,cTop[0]+60)},${Math.min(255,cTop[1]+60)},${Math.min(255,cTop[2]+60)},0.5)`; ctx.fill();
  rrect(fx,fy,w,h,r); ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.stroke();
  ctx.font=font; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle=tc; ctx.fillText(text,fx+w/2,fy+h/2);
  ctx.restore();
}

function drawTopSpikes(fa=0){
  ctx.save();
  ctx.fillStyle='rgb(105,62,18)'; ctx.fillRect(0,0,GW,50);
  ctx.fillStyle='rgb(55,28,5)';   ctx.fillRect(0,44,GW,6);
  ctx.fillStyle='rgba(255,220,160,0.35)'; ctx.fillRect(3,4,GW-6,10);
  ctx.fillStyle='rgba(255,200,120,0.16)'; ctx.fillRect(3,16,GW-6,6);
  ctx.fillStyle='rgb(150,0,0)';
  for(let i=0;i<GW;i+=20){ctx.beginPath();ctx.moveTo(i,50);ctx.lineTo(i+10,70);ctx.lineTo(i+20,50);ctx.closePath();ctx.fill();}
  if(fa>0){
    ctx.fillStyle=`rgba(255,255,255,${fa/255})`;
    for(let i=0;i<GW;i+=20){ctx.beginPath();ctx.moveTo(i,50);ctx.lineTo(i+10,70);ctx.lineTo(i+20,50);ctx.closePath();ctx.fill();}
  }
  ctx.restore();
}

/* ═══════════════════════ PLAYER ═══════════════════════ */
const F_LG  ="bold 48px 'Microsoft JhengHei','PingFang TC',sans-serif";
const F_HALF_LG ="bold 24px 'Microsoft JhengHei','PingFang TC',sans-serif";
const F_MED ="32px 'Microsoft JhengHei','PingFang TC',sans-serif";
const F_MED_B="bold 32px 'Microsoft JhengHei','PingFang TC',sans-serif";
const F_SM  ="20px 'Microsoft JhengHei','PingFang TC',sans-serif";
const F_SM_RB="bold 30px 'Microsoft JhengHei','PingFang TC',sans-serif";

class Player{
  constructor(){
    this.x=GW/2-15; this.y=100; this.w=30; this.h=30; this.velY=0;
    this.maxHp=20; this.hp=10; this.dispHp=10; this.score=0;
    this.flyMode=false; this.flyUpCnt=0;
    this.flashT=0; this.flashType='';
    this.hist=[]; this.upHist=[];
    this.healLand=0; this.normLand=0; this.combo=0;
    this.rainbow=false; this.rainbowT=0; this.rainbowOutT=0; this.scoreMult=1; this.extraT=999;
    this.hitSpike=false; this.onSpikeP=false;
    this.lastPlat=null; this.curPlat=null;
    this.downPressCount=0; this.downLastPressTime=0; this.upT=0; this.upWas=false; this.upBoosting=false; this.upUsed=true;
    this.firstFallJumped=false; // 第一次離梯下落時允許免費空中跳躍
    this.healSupp=false;
    this.rainbowSafeCombo=0; // consecutive non-damaging landings while in rainbow mode (normal mode only)
    this.invertTimer = 0;
    this.speedTimer = 0;
    this.hasAchievedSinceDamage = false;
  }
  triggerExtraBonus(){
    if(this.invertTimer <= 0) {
      this.invertTimer = 10;
      if(!this.hasAchievedSinceDamage){
        this.speedTimer = 10;
        this.hasAchievedSinceDamage = true;
      }
    }
  }
  get left()  {return this.x;}        set left(v)  {this.x=v;}
  get right() {return this.x+this.w;} set right(v) {this.x=v-this.w;}
  get top()   {return this.y;}        set top(v)   {this.y=v;}
  get bottom(){return this.y+this.h;} set bottom(v){this.y=v-this.h;}
  get cx(){return this.x+this.w/2;}
  get cy(){return this.y+this.h/2;}
  get r() {return this.w/2;}

  hurt(amt){
    this.hp=Math.max(0,Math.min(this.maxHp,this.hp+amt));
    if(amt<0){
      this.hasAchievedSinceDamage = false;
      this.healSupp=false; this.flashT=30; this.flashType='DEC';
      playBuf(SFX.damage); this.flyUpCnt=0;
      if(this.rainbow&&!this.flyMode){this.rainbow=false;this.combo=0;this.scoreMult=1;this.rainbowOutT=0;}
      this.invertTimer = 0;
      this.speedTimer = 0;
      this.rainbowSafeCombo=0; // damage resets the rainbow safe combo
    } else if(amt>0){
      if(this.flyMode&&this.hp>=this.maxHp)this.healSupp=true;
      if(!this.healSupp){this.flashT=30;this.flashType='INC';playBuf(SFX.heal);}
    }
  }

  move(keys){
    if(keys.left) this.x-=PLAYER_SPEED;
    if(keys.right)this.x+=PLAYER_SPEED;
    if(this.right<0)this.x=GW; else if(this.left>GW)this.right=0;
  }

  update(){
    let wasExtra = (this.w > 30);
    if(this.invertTimer > 0) this.invertTimer = Math.max(0, this.invertTimer - 1/60);
    if(this.speedTimer > 0) this.speedTimer = Math.max(0, this.speedTimer - 1/60);
    
    let isExtra = (this.invertTimer > 0);
    if (isExtra && !wasExtra) {
      let oldCx = this.cx, oldCy = this.cy;
      this.w = 48; this.h = 48;
      this.x = oldCx - this.w/2; this.y = oldCy - this.h/2;
    } else if (!isExtra && wasExtra) {
      let oldCx = this.cx, oldCy = this.cy;
      this.w = 30; this.h = 30;
      this.x = oldCx - this.w/2; this.y = oldCy - this.h/2;
    }
    
    this.velY=Math.min(this.velY+GRAVITY,MAX_FALL);
    if(this.velY>=0)this.upBoosting=false;
    this.hist.unshift([this.x,this.y]); if(this.hist.length>10)this.hist.pop();
    if(this.upBoosting){this.upHist.unshift([this.x,this.y]);if(this.upHist.length>10)this.upHist.pop();}
    else this.upHist=[];
    this.y+=this.velY;
  }

  draw(){
    const {cx,cy,r}=this;
    // ── up-boost afterimages ──
    for(let i=this.upHist.length-1;i>=0;i--){
      const[hx,hy]=this.upHist[i],f=i/10;
      ctx.save(); ctx.globalAlpha=(190-170*f)/255;
      ctx.beginPath();ctx.arc(hx%GW+r,hy+r,r,0,Math.PI*2);
      ctx.fillStyle=`rgb(0,${Math.round(160-130*f)},${Math.round(255-135*f)})`; ctx.fill();
      ctx.strokeStyle='rgba(0,0,80,0.8)';ctx.lineWidth=2;ctx.stroke(); ctx.restore();
    }
    // ── fall afterimages ──
    if(this.velY>0){
      for(let i=this.hist.length-1;i>=0;i--){
        const[hx,hy]=this.hist[i],f=i/10;
        ctx.save(); ctx.globalAlpha=(180-160*f)/255;
        ctx.beginPath();ctx.arc(hx%GW+r,hy+r,r,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();
        ctx.strokeStyle='rgba(0,0,0,0.8)';ctx.lineWidth=2;ctx.stroke();
        ctx.globalAlpha=100*(1-f)/255;
        ctx.beginPath();ctx.arc(hx%GW+r*.7,hy+r*.7,r*.4,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
        ctx.restore();
      }
    }
    // ── rainbow glow ──
    if(this.rainbow){
      this.rainbowT+=1/60;
      const flick=0.3+0.7*((Math.sin(this.rainbowT*10)+1)/2);
      const gw=Math.max(1,Math.round(r*flick));
      for(let s=gw;s>0;s--){
        ctx.save();ctx.globalAlpha=210*(1-s/gw)/255;
        ctx.beginPath();ctx.arc(cx,cy,r+s,0,Math.PI*2);ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();
        ctx.restore();
      }
    }
    // ── body color ──
    let bc;
    if(this.rainbow){const hue=(this.rainbowT*180)%360;const[rr,gg,bb]=hsl2rgb(hue,100,55);bc=`rgb(${rr},${gg},${bb})`;}
    else bc='rgb(50,150,250)';
    ctx.save();
    if(this.hitSpike){
      ctx.fillStyle='rgb(128,0,128)';
      ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,0);ctx.lineTo(cx+r,cy);ctx.lineTo(cx-r,cy);ctx.closePath();ctx.fill();
      ctx.globalAlpha=.5;ctx.fillStyle=bc;
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI);ctx.closePath();ctx.fill();
    } else if(this.onSpikeP){
      ctx.globalAlpha=.5;ctx.fillStyle=bc;
      ctx.beginPath();ctx.arc(cx,cy,r,Math.PI,0);ctx.lineTo(cx+r,cy);ctx.lineTo(cx-r,cy);ctx.closePath();ctx.fill();
      ctx.globalAlpha=1;ctx.fillStyle='rgb(128,0,128)';
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI);ctx.closePath();ctx.fill();
    } else {
      ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=bc;ctx.fill();
    }
    ctx.globalAlpha=100/255;
    ctx.beginPath();ctx.arc(cx-r*.3,cy-r*.3,r*.4,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    ctx.globalAlpha=1;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.stroke();

    ctx.restore();
  }
}

/* ═══════════════════════ PLATFORM ═══════════════════════ */
class Platform{
  constructor(x,y,type='normal'){
    this.x=x;this.y=y;this.w=100;this.h=15;this.type=type;
    this.healed=0;this.fading=false;this.fadeT=0;this.fadeDur=0.5;
    this.triggered=false;this.trigT=0;
    this.hist=[];this.stepped=false;this.flashT=0;
    this.rainbowT=0; // for colorful stair animation
  }
  get left()  {return this.x;}
  get right() {return this.x+this.w;}
  get top()   {return this.y;}
  get bottom(){return this.y+this.h;}
  speed(){return(this.type==='purple'&&this.triggered)?PLAT_SPEED*2.5:PLAT_SPEED;}

  update(){
    this.y-=this.speed();
    if(this.fading)this.fadeT+=1/60;
    if(this.type==='purple'&&this.triggered){
      this.trigT+=1/60;
      this.hist.unshift([this.x,this.y]);if(this.hist.length>10)this.hist.pop();
    }
    if(this.type==='colorful'||this.type==='black')this.rainbowT+=1/60;
    if(this.flashT>0)this.flashT=Math.max(0,this.flashT-1/60);
  }

  draw(){
    // ── purple afterimages ──
    if(this.type==='purple'&&this.triggered){
      for(let i=this.hist.length-1;i>=0;i--){
        const[hx,hy]=this.hist[i],f=i/10;
        ctx.save();ctx.globalAlpha=(180-160*f)/255;
        ctx.fillStyle=`rgb(${Math.round(230-150*f)},${Math.round(80-80*f)},${Math.round(250-170*f)})`;
        ctx.fillRect(hx,hy,this.w,this.h);
        ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.strokeRect(hx,hy,this.w,this.h);
        ctx.globalAlpha=60*(1-f)/255;ctx.fillStyle='#fff';ctx.fillRect(hx+2,hy+2,this.w-4,Math.floor(this.h/3));
        ctx.restore();
      }
    }
    // ── main body ──
    ctx.save();
    if(this.type==='colorful'){
      // 繪製彩色漸層階梯
      const gr=ctx.createLinearGradient(this.x,this.y,this.x+this.w,this.y);
      const hOff=this.rainbowT*120;
      for(let i=0;i<=6;i++){
        const [r,g,b]=hsl2rgb((hOff+i*60)%360,100,55);
        gr.addColorStop(i/6,`rgb(${r},${g},${b})`);
      }
      ctx.fillStyle=gr;ctx.fillRect(this.x,this.y,this.w,this.h);
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(this.x,this.y,this.w,this.h);
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(this.x+2,this.y+2,this.w-4,Math.floor(this.h/3));
    } else if(this.type==='black'){
      // 繪製黑色階梯（帶微微閃爍星點）
      ctx.fillStyle='rgb(10,10,10)';ctx.fillRect(this.x,this.y,this.w,this.h);
      ctx.strokeStyle='rgb(60,60,60)';ctx.lineWidth=2;ctx.strokeRect(this.x,this.y,this.w,this.h);
      // 星點動畫
      const seed=Math.floor(this.rainbowT*3);
      for(let i=0;i<5;i++){
        const px=this.x+((seed*37+i*71)%this.w);
        const py=this.y+((seed*53+i*29)%this.h);
        const alpha=0.4+0.6*((Math.sin(this.rainbowT*4+i*1.3)+1)/2);
        ctx.globalAlpha=alpha;
        ctx.fillStyle='#fff';ctx.fillRect(px,py,2,2);
      }
      ctx.globalAlpha=1;
      ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fillRect(this.x+2,this.y+2,this.w-4,Math.floor(this.h/3));
    } else {
      let col;
      switch(this.type){
        case 'spike':  col='rgb(220,50,50)'; break;
        case 'heal':   col='rgb(50,220,50)'; break;
        case 'purple': col='rgb(128,0,128)'; break;
        case 'fade': {
          const p=this.fading?Math.min(this.fadeT/this.fadeDur,1):0;
          const v=Math.round(211+(255-211)*p); col=`rgb(${v},${v},${v})`; break;
        }
        case 'golden': col='rgb(255,200,0)'; break;
        default: col='rgb(100,100,100)';
      }
      if (this.type === 'golden') {
        const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 150);
        for (let i = 1; i <= 4; i++) {
          ctx.strokeStyle = `rgba(255, 255, 255, ${(0.8 - i * 0.15) * pulse})`;
          ctx.lineWidth = 2;
          ctx.strokeRect(this.x - i*2, this.y - i*2, this.w + i*4, this.h + i*4);
        }
      }
      ctx.fillStyle=col;ctx.fillRect(this.x,this.y,this.w,this.h);
      ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.strokeRect(this.x,this.y,this.w,this.h);
      ctx.fillStyle='rgba(255,255,255,0.235)';ctx.fillRect(this.x+2,this.y+2,this.w-4,Math.floor(this.h/3));
    }
    if(this.flashT>0){ctx.fillStyle=`rgba(255,255,255,${this.flashT/.25})`;ctx.fillRect(this.x,this.y,this.w,this.h);}
    ctx.restore();
  }
}

/* ═══════════════════════ GAME STATE ═══════════════════════ */
let state='START', player, platforms=[];
let frameCount=0, speedMult=1, startingSpeedMult=1, spikeFlash=0, gameMode='normal', scoreStyleAlt=false;
let selIdx=0, escCnt=0, rightArrowCount=0;
let btnSY=GH/2-30, btnFY=GH/2+50; // Y-pos for start / fly buttons (shift in GAME_OVER)
let gameStartTime=0, totalStairs=0, gameRating=1;

/* ── Time Limit State ── */
let pageStartTime=Date.now();
let isTimeRestricted=false;
const urlParams = new URLSearchParams(window.location.search);
const limitMs = urlParams.has('testLimit') ? 10000 : 12 * 60 * 1000;

const BP=[10,10,62,30],BS=[80,10,52,30]; // Pause, Stop
const B05=[140,10,52,30],B10=[200,10,52,30],B15=[260,10,52,30];
const BSWITCH=[10,10,120,30]; // 切換方向鍵 (menu screens only)
const BGESTURE=[GW-130,10,120,30]; // 使用手勢

function resetGame(mode){
  gameMode=mode; player=new Player();
  if(mode==='fly'){player.flyMode=true;player.rainbow=true;player.hp=20;player.dispHp=20;}
  const p=new Platform(GW/2-50,GH-100,'normal');p.stepped=true;platforms=[p];
  player.bottom=p.top; player.x=p.x+p.w/2-player.w/2;
  player.velY=0; player.curPlat=p; player.lastPlat=p;
}

function startGame(mode){
  initSounds(); if(AC?.state==='suspended')AC.resume();
  resetGame(mode); state='PLAYING'; btnSY=GH/2-30; btnFY=GH/2+50; escCnt=0; frameCount=0; scoreStyleAlt=false;
  startingSpeedMult = speedMult;
  gameStartTime=Date.now(); totalStairs=0;
}

/* ═══════════════════════ INPUT ═══════════════════════ */
const keys={left:false,right:false,up:false,down:false};
let mX=-1,mY=-1;

const activeTouches = new Map();

function updateGestureKeys() {
  let left = false, right = false, up = false, down = false;
  const thresh = 15;
  for (const t of activeTouches.values()) {
    const dx = t.curX - t.startX, dy = t.curY - t.startY;
    if (dx < -thresh) left = true;
    if (dx > thresh) right = true;
    if (dy < -thresh) up = true;
    if (dy > thresh) down = true;
  }
  keys.left = left; keys.right = right; keys.up = up; keys.down = down;
}

canvas.addEventListener('pointermove',e=>{
  const rc=canvas.getBoundingClientRect();mX=(e.clientX-rc.left)/CS;mY=(e.clientY-rc.top)/CS;
  if(useGesture && state === 'PLAYING' && activeTouches.has(e.pointerId)) {
    const t = activeTouches.get(e.pointerId);
    t.curX = mX; t.curY = mY;
    updateGestureKeys();
  }
});
canvas.addEventListener('pointerdown',e=>{
  initSounds();if(AC?.state==='suspended')AC.resume();
  const rc=canvas.getBoundingClientRect();
  const mx=(e.clientX-rc.left)/CS, my=(e.clientY-rc.top)/CS;
  if(useGesture && state === 'PLAYING') {
    if(activeTouches.size < 2) {
      activeTouches.set(e.pointerId, { startX: mx, startY: my, curX: mx, curY: my });
    }
  }
  handleClick(mx, my);
});
const endGesture = (e) => {
  if (e && e.pointerId != null && activeTouches.has(e.pointerId)) {
    activeTouches.delete(e.pointerId);
    updateGestureKeys();
  }
};
canvas.addEventListener('pointerup', endGesture);
canvas.addEventListener('pointercancel', endGesture);
canvas.addEventListener('pointerleave', endGesture);

function inR(mx,my,b){return mx>=b[0]&&mx<=b[0]+b[2]&&my>=b[1]&&my<=b[1]+b[3];}
function inXYWH(mx,my,x,y,w,h){return mx>=x&&mx<=x+w&&my>=y&&my<=y+h;}
function mInR(b){return inR(mX,mY,b);}

function handleClick(mx,my){
  if(isTimeRestricted)return;
  if(state==='START'||state==='GAME_OVER'){
    if(inXYWH(mx,my,GW/2-80,btnSY,160,60)){startGame(state==='GAME_OVER'?gameMode:'normal');return;}
    if(inXYWH(mx,my,GW/2-80,btnFY,160,60)){
      if(state==='GAME_OVER') {
        state='START';speedMult=1;selIdx=0;btnSY=GH/2-30;btnFY=GH/2+50;
      } else {
        startGame('fly');
      }
      return;
    }
    if(inR(mx,my,BSWITCH)){layoutMode=(layoutMode+1)%10;resize();return;}
    if(inR(mx,my,BGESTURE)){useGesture=!useGesture;resize();return;}
  }
  if(state==='PLAYING'||state==='PAUSED'){
    if(inR(mx,my,BP)){state=state==='PAUSED'?'PLAYING':'PAUSED';return;}
    if(inR(mx,my,BS)){state='START';speedMult=1;btnSY=GH/2-30;btnFY=GH/2+50;return;}
  }
  if(['START','GAME_OVER','PAUSED'].includes(state)){
    if(inR(mx,my,B05)){speedMult=0.5;if(state==='GAME_OVER')scoreStyleAlt=true;return;}
    if(inR(mx,my,B10)){speedMult=1.0;if(state==='GAME_OVER')scoreStyleAlt=true;return;}
    if(inR(mx,my,B15)){speedMult=1.5;if(state==='GAME_OVER')scoreStyleAlt=true;return;}
  }
}

// Keyboard
function triggerFlash(dir) {
  const el = document.getElementById('tb-' + dir);
  if (el) {
    el.classList.remove('flash-active');
    void el.offsetWidth; // force reflow
    el.classList.add('flash-active');
  }
}

window.addEventListener('keydown',e=>{
  if(isTimeRestricted)return;
  let pressedKey = null;
  if(e.key==='ArrowLeft' ||e.key==='a') { if(!keys.left) { keys.left=true; pressedKey='left'; } }
  if(e.key==='ArrowRight'||e.key==='d') { if(!keys.right){ keys.right=true; pressedKey='right'; } }
  if(e.key==='ArrowUp'   ||e.key==='w') { if(!keys.up)   { keys.up=true; pressedKey='up'; } }
  if(e.key==='ArrowDown' ||e.key==='s') { if(!keys.down) { keys.down=true; pressedKey='down'; } }

  if(pressedKey){
    triggerFlash(pressedKey);
    const btn = document.getElementById('tb-' + pressedKey);
    if(btn) btn.classList.add('pressed');
  }

  if (state === 'GAME_OVER' && recordFlowState !== 'NONE') {
    if (recordFlowState === 'PROMPT') {
      if (e.key === 'ArrowLeft' || e.key === 'a') { promptRecordIndex = 0; updatePromptRecordUI(); }
      if (e.key === 'ArrowRight' || e.key === 'd') { promptRecordIndex = 1; updatePromptRecordUI(); }
      if (e.key === 'Enter' || e.key === 'NumpadEnter') {
        if (promptRecordIndex === 0) document.getElementById('score-prompt-yes').click();
        else document.getElementById('score-prompt-no').click();
        return;
      }
    }
    if (e.key === 'Enter' || e.key === 'NumpadEnter') {
      return;
    }
  }

  if(state==='START'){
    if(e.key==='ArrowUp') { selIdx=(selIdx-1+2)%2; rightArrowCount=0; }
    else if(e.key==='ArrowDown') { selIdx=(selIdx+1)%2; rightArrowCount=0; }
    else if(e.key==='Enter'||e.key==='NumpadEnter') { startGame(selIdx===0?'normal':'fly'); rightArrowCount=0; }
    else if(e.key==='ArrowLeft') {
      const sp=[.5,1,1.5];let i=sp.indexOf(speedMult);if(i<0)i=1;speedMult=sp[Math.max(0,i-1)];
      rightArrowCount=0;
    }
    else if(e.key==='ArrowRight'){
      const sp=[.5,1,1.5];let i=sp.indexOf(speedMult);if(i<0)i=1;speedMult=sp[Math.min(2,i+1)];
      rightArrowCount++;
      if (rightArrowCount >= 6) {
        rightArrowCount = 0;
        showTop20(selIdx === 0 ? 'normal' : 'fly');
      }
    } else {
      rightArrowCount = 0;
    }
  }
  if(state==='GAME_OVER' && recordFlowState==='NONE'){
    if(e.key==='ArrowUp')   selIdx=(selIdx-1+2)%2;
    if(e.key==='ArrowDown') selIdx=(selIdx+1)%2;
    if(e.key==='Enter'||e.key==='NumpadEnter'){
      if(selIdx===1){
        state='START';speedMult=1;selIdx=0;btnSY=GH/2-30;btnFY=GH/2+50;
      } else {
        startGame(gameMode);
      }
    }
    if(e.key==='ArrowLeft') {const sp=[.5,1,1.5];let i=sp.indexOf(speedMult);if(i<0)i=1;speedMult=sp[Math.max(0,i-1)];}
    if(e.key==='ArrowRight'){const sp=[.5,1,1.5];let i=sp.indexOf(speedMult);if(i<0)i=1;speedMult=sp[Math.min(2,i+1)];}
  }
  if(['PLAYING','PAUSED'].includes(state)){
    if(e.key==='ArrowUp'||e.key==='w'){
      if(escCnt<5) escCnt++;
      else escCnt=1;
    }
    if(e.key==='ArrowDown'||e.key==='s'){
      if(escCnt===5){escCnt=0;state='START';speedMult=1;btnSY=GH/2-30;btnFY=GH/2+50;}
      else {
        escCnt=0;
        // Double-press DOWN to penetrate platform
        if(state==='PLAYING' && player && player.curPlat && ['normal','heal','golden','colorful'].includes(player.curPlat.type)){
          const now = performance.now() / 1000;
          if(now - player.downLastPressTime < 0.4){
            player.downPressCount++;
          } else {
            player.downPressCount = 1;
          }
          player.downLastPressTime = now;
          if(player.downPressCount >= 2){
            player.y += 25;
            if(player.invertTimer <= 0 && player.curPlat.type === 'normal'){
              player.hurt(-1);
            }
            // 穿透金黃色階梯：回血1格
            if(player.curPlat.type === 'golden'){
              player.hurt(1);
            }
            player.downPressCount = 0;
            player.curPlat = null;
          }
        }
      }
    }
    if(e.key==='ArrowLeft'||e.key==='a'||e.key==='ArrowRight'||e.key==='d')escCnt=0;
    if(e.key==='Control')state=state==='PAUSED'?'PLAYING':'PAUSED';
  }
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();
});
window.addEventListener('keyup',e=>{
  if(isTimeRestricted)return;
  let releasedKey = null;
  if(e.key==='ArrowLeft' ||e.key==='a') { keys.left =false; releasedKey='left'; }
  if(e.key==='ArrowRight'||e.key==='d') { keys.right=false; releasedKey='right'; }
  if(e.key==='ArrowUp'   ||e.key==='w') { keys.up   =false; releasedKey='up'; }
  if(e.key==='ArrowDown' ||e.key==='s') { keys.down =false; releasedKey='down'; }

  if(releasedKey){
    const btn = document.getElementById('tb-' + releasedKey);
    if(btn) btn.classList.remove('pressed');
  }
});

// Touch direction buttons — 最多同時接受 2 個方向輸入
const touchPressedDirs = new Set();
['left','right','up','down'].forEach(dir=>{
  const el=document.getElementById('tb-'+dir);
  el.addEventListener('animationend', () => {
    el.classList.remove('flash-active');
  });
  const on=ev=>{
    if(isTimeRestricted)return;
    ev.preventDefault();
    if(state==='START'){
      if(dir==='up') selIdx=(selIdx-1+2)%2;
      if(dir==='down') selIdx=(selIdx+1)%2;
      if(dir==='left') {const sp=[.5,1,1.5];let i=sp.indexOf(speedMult);if(i<0)i=1;speedMult=sp[Math.max(0,i-1)];}
      if(dir==='right'){const sp=[.5,1,1.5];let i=sp.indexOf(speedMult);if(i<0)i=1;speedMult=sp[Math.min(2,i+1)];}
    }
    if(state==='GAME_OVER' && recordFlowState==='NONE'){
      if(dir==='up') selIdx=(selIdx-1+2)%2;
      if(dir==='down') selIdx=(selIdx+1)%2;
      if(dir==='left') {const sp=[.5,1,1.5];let i=sp.indexOf(speedMult);if(i<0)i=1;speedMult=sp[Math.max(0,i-1)];}
      if(dir==='right'){const sp=[.5,1,1.5];let i=sp.indexOf(speedMult);if(i<0)i=1;speedMult=sp[Math.min(2,i+1)];}
    }
    // Double-tap DOWN to penetrate (touch version)
    if(dir==='down' && state==='PLAYING' && player && player.curPlat && ['normal','heal','golden','colorful'].includes(player.curPlat.type)){
      const now = performance.now() / 1000;
      if(now - player.downLastPressTime < 0.4){
        player.downPressCount++;
      } else {
        player.downPressCount = 1;
      }
      player.downLastPressTime = now;
      if(player.downPressCount >= 2){
        player.y += 25;
        if(player.invertTimer <= 0 && player.curPlat.type === 'normal'){
          player.hurt(-1);
        }
        // 穿透金黃色階梯：回血1格
        if(player.curPlat.type === 'golden'){
          player.hurt(1);
        }
        player.downPressCount = 0;
        player.curPlat = null;
      }
    }
    // 若此方向尚未按下，且已有 2 個方向被按住，則不再新增
    if(!touchPressedDirs.has(dir) && touchPressedDirs.size >= 2) return;
    if(!keys[dir]){
      keys[dir]=true;
      touchPressedDirs.add(dir);
      triggerFlash(dir);
    }
    el.classList.add('pressed');
    initSounds();
  };
  const off=ev=>{
    ev.preventDefault();
    keys[dir]=false;
    touchPressedDirs.delete(dir);
    el.classList.remove('pressed');
  };
  el.addEventListener('pointerdown',e=>{on(e);try{el.setPointerCapture(e.pointerId);}catch(_){}});
  ['pointerup','pointercancel','pointerleave'].forEach(t=>el.addEventListener(t,off));
  el.addEventListener('pointermove',e=>e.preventDefault());
});

/* ═══════════════════════ UPDATE ═══════════════════════ */
function updateGame(){
  if(state!=='PLAYING')return;
  player.move(keys);
  player.update();
  frameCount++; if(frameCount>=SPAWN_RATE){
    frameCount=0;
    const rr=Math.random(); let t;
    if(player.invertTimer > 0){
      t='golden';
    } else {
      // normal:60%, spike:20%, heal(綠):4%, fade(白):10%, purple:5%, colorful(彩色):0.5%, black(黑):0.5%
      if(rr<.60)t='normal'; else if(rr<.80)t='spike'; else if(rr<.84)t='heal'; else if(rr<.94)t='fade'; else if(rr<.99)t='purple'; else if(rr<.995)t='colorful'; else t='black';
    }
    platforms.push(new Platform(Math.random()*(GW-100),GH+20,t));
  }
  platforms.forEach(p=>p.update());
  platforms=platforms.filter(p=>p.bottom>0&&!(p.type==='fade'&&p.fading&&p.fadeT>=p.fadeDur)&&!(p.type==='purple'&&p.triggered&&p.trigT>=.5));

  // Collision
  let onPlat=false; player.onSpikeP=false; player.curPlat=null;
  for(const p of platforms){
    const ps=p.speed(),vOK=p.type==='spike'?player.velY>0:player.velY>=-ps;
    if(vOK&&p.top<=player.bottom&&player.bottom<=p.top+20&&player.right>p.left&&player.left<p.right){
      player.bottom=p.top; player.velY=-ps; onPlat=true; player.curPlat=p;
      if(!p.stepped){p.stepped=true;p.flashT=.25;
        // 滴答倒數中：踩階梯音效音量降低50%
        const coinGain = (player.invertTimer > 0) ? 0.5 : 1.0;
        playBufGain(SFX.coin, coinGain);
      }
      const isNew=p!==player.lastPlat; player.lastPlat=p;
      if(isNew){player.upUsed=false;player.flyUpCnt=0;totalStairs++;}
      let effType = p.type;

      if(effType==='spike'){
        // 星空模式(fly)下，踩到已出現的紅色階梯不扣血
        if(gameMode==='fly' && p.stepped) {
          // no damage in fly mode for already-appeared spike
        } else {
          player.hurt(-1);
        }
        if(isNew)player.combo=0; player.onSpikeP=true;
      } else if(effType==='heal' || effType==='golden'){
        if(isNew){player.combo++;player.healLand=0;player.score+=2*player.scoreMult;
          // Rainbow safe combo tracking (normal game mode only)
          if(player.rainbow){player.rainbowSafeCombo++;if(player.rainbowSafeCombo>=6){player.score+=18;player.rainbowSafeCombo=0;player.extraT=0;}}
        }
        if(player.hp<player.maxHp&&p.healed<3){player.healLand++;if(player.healLand>=45){player.healLand=0;player.hurt(1);p.healed++;}}
      } else if(effType==='fade'){
        if(isNew){
          // White (fade) stair: deduct 1 HP unless in extra-bonus mode
          if(player.invertTimer <= 0) player.hurt(-1);
          if(player.rainbow){player.rainbow=false;player.scoreMult=1;player.rainbowOutT=0;}
          player.combo=0;player.rainbowSafeCombo=0;
        }
        p.fading=true;
      } else if(effType==='purple'){
        if(isNew){
          if(player.invertTimer <= 0){
            if(player.rainbow){player.rainbow=false;player.scoreMult=1;player.rainbowOutT=0;}
            player.invertTimer=0;player.speedTimer=0;
            player.combo=0;player.rainbowSafeCombo=0;
          }
        }
        if(!p.triggered){p.triggered=true;p.trigT=0;}
      } else if(effType==='colorful'){
        // 彩色階梯：分數+3，回血機制同綠色（heal），最多回血3次，站45幀回1格
        if(isNew){
          platforms.forEach(pl=>{if(pl!==p)pl.type='heal';});
          player.combo++;player.healLand=0;player.score+=3*player.scoreMult;
          if(player.rainbow){player.rainbowSafeCombo++;if(player.rainbowSafeCombo>=6){player.score+=18;player.rainbowSafeCombo=0;player.extraT=0;player.triggerExtraBonus();}}
        }
        if(player.hp<player.maxHp&&p.healed<3){player.healLand++;if(player.healLand>=45){player.healLand=0;player.hurt(1);p.healed++;}}
      } else if(effType==='black'){
        // 黑色階梯：隨機變成任一顏色階梯（灰/白/綠/紅/紫/彩虹），各⅙機率
        if(isNew){
          const blackTypes=['normal','fade','heal','spike','purple','colorful'];
          const chosen=blackTypes[Math.floor(Math.random()*6)];
          p.type=chosen;
          p.healed=0;p.fading=false;p.fadeT=0;p.triggered=false;p.trigT=0;p.hist=[];
          let effChosen = chosen;
          // 重新依新類型處理踩踏（遞迴避免：直接套用一次效果）
          if(effChosen==='spike'){
            player.hurt(-1);player.combo=0; player.onSpikeP=true;
          } else if(effChosen==='heal' || effChosen==='golden'){
            player.combo++;player.healLand=0;player.score+=2*player.scoreMult;
            if(player.rainbow){player.rainbowSafeCombo++;if(player.rainbowSafeCombo>=6){player.score+=18;player.rainbowSafeCombo=0;player.extraT=0;}}
          } else if(effChosen==='fade'){
            player.hurt(-1);if(player.rainbow){player.rainbow=false;player.scoreMult=1;player.rainbowOutT=0;}player.combo=0;player.rainbowSafeCombo=0;
            p.fading=true;
          } else if(effChosen==='purple'){
            if(player.rainbow){player.rainbow=false;player.scoreMult=1;player.rainbowOutT=0;player.invertTimer=0;player.speedTimer=0;}player.combo=0;player.rainbowSafeCombo=0;
            p.triggered=true;p.trigT=0;
          } else if(effChosen==='colorful'){
            platforms.forEach(pl=>{if(pl!==p)pl.type='heal';});
            player.combo++;player.score+=1*player.scoreMult;
          } else if(effChosen==='normal') {
            // normal (灰色)
            player.combo++;player.normLand=0;player.score+=1*player.scoreMult;
            if(player.rainbow){player.rainbowSafeCombo++;if(player.rainbowSafeCombo>=6){player.score+=18;player.rainbowSafeCombo=0;player.extraT=0;player.triggerExtraBonus();}}
          }
        } else {
          // 已變身後按新類型繼續處理（讓原有碰撞在下一幀生效）
        }
      } else if(effType==='normal') {
        if(isNew){player.combo++;player.normLand=0;player.score+=1*player.scoreMult;
          // Rainbow safe combo tracking (normal game mode only)
          if(player.rainbow){player.rainbowSafeCombo++;if(player.rainbowSafeCombo>=6){player.score+=18;player.rainbowSafeCombo=0;player.extraT=0;player.triggerExtraBonus();}}
        }
        if(player.hp<player.maxHp&&p.healed<1){player.normLand++;if(player.normLand>=60){player.normLand=0;player.hurt(1);p.healed++;}}
      }
      if(player.combo>=5&&!player.rainbow){player.rainbow=true;player.scoreMult=2;player.rainbowOutT=0;}
      break;
    }
  }
  if(onPlat)player.hist=[];

  // Penetration logic is now handled in the keydown event (double-press DOWN)

  // Up boost
  if(keys.up){
    if(!player.curPlat){
      if(!player.upWas){
        // 第一次離梯下落：允許空中跳躍一次
        const firstFallFree = !player.firstFallJumped && player.upUsed && gameMode==='normal';
        const canBoost = gameMode==='fly' || !player.upUsed || firstFallFree;
        if(canBoost){
          player.upBoosting=true;
          if(gameMode==='normal'){
            if(firstFallFree) player.firstFallJumped=true; // 標記已使用本局首跳機會
            if(player.invertTimer > 0){
              playBuf(SFX.boost);
            } else if(player.hp <= 5){
              playBuf(SFX.boost);
            } else {
              player.hurt(-2); // 扣血2格＋觸發扣血音效
            }
            player.upUsed=true;
          } else {
            player.score+=3;player.flyUpCnt++;if(player.flyUpCnt>=3){player.hurt(1);player.flyUpCnt=0;}playBuf(SFX.boost);
          }
        }
      }
      if(player.upBoosting){player.upT+=1/60;if(player.upT<=.2)player.velY=-(PLAT_SPEED*3);else player.upBoosting=false;}
    } else{player.upT=0;player.upBoosting=false;}
  } else{player.upT=0;player.upBoosting=false;}
  player.upWas=keys.up;

  // Top spikes
  if(player.top<=70){if(!player.hitSpike)spikeFlash=.001;player.hurt(-7);player.y+=20;player.velY=0;player.hitSpike=true;}
  else player.hitSpike=false;

  // Death
  if(player.top>GH||player.hp<=0){
    const elapsedSec = (Date.now() - gameStartTime) / 1000;
    const speedFactor = (speedMult - 0.5) / 1.5;
    let composite = (player.score / 400.0) * 50.0 +
                    (totalStairs / 100.0) * 30.0 +
                    speedFactor * 20.0;
    if (startingSpeedMult === 1.0 || startingSpeedMult === 1.5) {
      composite = composite / 1.5625;
    }
    composite = Math.max(0.0, Math.min(composite, 100.0));
    
    if(composite >= 80) gameRating = 5;
    else if(composite >= 60) gameRating = 4;
    else if(composite >= 40) gameRating = 3;
    else if(composite >= 20) gameRating = 2;
    else gameRating = 1;

    if(gameRating === 5 && player.score < 999) gameRating = 4;
    if(gameRating === 4 && player.score < 777) gameRating = 3;
    
    if(player.score === 0) gameRating = 1;

    state='GAME_OVER';
    recordFlowState = 'WAIT_PROMPT';
    setTimeout(() => {
      if (recordFlowState === 'WAIT_PROMPT') {
        recordFlowState = 'PROMPT';
        promptRecordIndex = 0;
        updatePromptRecordUI();
        document.getElementById('score-prompt-overlay').style.display = 'flex';
      }
    }, 500);
    selIdx=0;btnSY=GH/2+140;btnFY=GH/2+215;playBuf(SFX.gameover);
  }

  if(spikeFlash>0){spikeFlash+=1/60;if(spikeFlash>=.2)spikeFlash=0;}
}

/* ═══════════════════════ DRAW ═══════════════════════ */
function drawBg(){
  // In extra-bonus/grayscale mode, use rainbow9 background; otherwise default
  const useInvert = (player && player.invertTimer > 0);
  const activeBg = useInvert ? (bgImgRainbow9 || bgImg) : bgImg;
  if(activeBg){
    let bgAlpha = 0.8;
    if (player.score >= 701) bgAlpha = 1.0;
    else if (player.score >= 501) bgAlpha = 1.0;
    else if (player.score >= 301) bgAlpha = 0.95;
    else if (player.score >= 201) bgAlpha = 0.90;
    else if (player.score >= 101) bgAlpha = 0.85;
    ctx.save();ctx.globalAlpha=bgAlpha;
    if(['START','GAME_OVER'].includes(state) && !isTimeRestricted)bgX=((bgX-BG_SPEED)%GW+GW)%GW;
    const bx=Math.round(bgX);
    ctx.drawImage(activeBg,bx,   0,GW,GH);
    ctx.drawImage(activeBg,bx-GW,0,GW,GH);
    ctx.restore();
  } else {
    const gr=ctx.createLinearGradient(0,0,GW,GH);
    gr.addColorStop(0,'#1a0a2e');gr.addColorStop(.5,'#16213e');gr.addColorStop(1,'#0f3460');
    ctx.fillStyle=gr;ctx.fillRect(0,0,GW,GH);
  }
}

function drawHpBar(){
  if(player.dispHp<player.hp)player.dispHp=Math.min(player.hp,player.dispHp+.2);
  else if(player.dispHp>player.hp)player.dispHp=Math.max(player.hp,player.dispHp-.5);
  if(player.flashT>0)player.flashT--;
  let hCol;
  if(player.dispHp>10)hCol='rgb(50,150,250)';
  else if(player.dispHp/10<.30)hCol='rgb(220,50,50)';
  else if(player.dispHp/10<.75)hCol='rgb(255,165,0)';
  else hCol='rgb(50,220,50)';
  let bx=GW-160,by=10,bw=150,bh=30,bordCol='#000';
  if(player.flashT>0){
    if(player.flashType==='DEC'){
      if(Math.floor(player.flashT/8)%2===0)hCol='rgb(128,0,128)';
      if(Math.floor(player.flashT/4)%2===0){bordCol='rgb(128,0,128)';bx-=4;by-=4;bw+=8;bh+=8;}
    } else if(player.flashType==='INC'){
      if(Math.floor(player.flashT/4)%2===0){bordCol='rgb(0,100,0)';bx-=4;by-=4;bw+=8;bh+=8;}
    }
  }
  ctx.fillStyle=bordCol;ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='#000';ctx.fillRect(GW-158,12,146,26);
  const hw=Math.max(0,Math.round(146*player.dispHp/player.maxHp));
  if(hw>0){
    ctx.fillStyle=hCol;ctx.fillRect(GW-158,12,hw,26);
    ctx.fillStyle='rgba(255,255,255,0.235)';ctx.fillRect(GW-157,14,hw-2,Math.floor(26/3));
  }
}

function drawScoreUI(){
  const isR=player.rainbow;
  const font=isR?F_SM_RB:F_SM, text=`分數: ${player.score}`;
  
  const sec = Math.floor(player.invertTimer);
  const ms = Math.floor((player.invertTimer - sec) * 1000);
  const timerText = `${String(sec).padStart(2, '0')}秒${String(ms).padStart(3, '0')}`;
  const timerY = 60 + (isR ? 45 : 30);
  
  let targetAlpha = 1;
  if(player.extraT < 0.5){
    player.extraT += 1/60;
    targetAlpha = Math.min(1, player.extraT / 0.5) * 0.95;
  }
  
  if(isR){
    player.rainbowOutT+=1/60;
    const rAlpha = Math.min(player.rainbowOutT/.25,1)*targetAlpha;
    drawScoreTxt(text,font,GW-80,60,6,13,rAlpha,player.flyMode,targetAlpha);
    // 計時器：秒數本體和第二層外框皆為黑色
    if(player.invertTimer > 0) drawScoreTxt(timerText,font,GW-80,timerY,6,13,rAlpha,player.flyMode,targetAlpha,true);
  } else {
    drawScoreTxt(text,font,GW-80,60,4,9,targetAlpha,player.flyMode,targetAlpha);
    // 計時器：秒數本體和第二層外框皆為黑色
    if(player.invertTimer > 0) drawScoreTxt(timerText,font,GW-80,timerY,4,9,targetAlpha,player.flyMode,targetAlpha,true);
  }
}

function drawTopBarUI(){
  const inG=state==='PLAYING'||state==='PAUSED';
  const inMenu=state==='START'||state==='GAME_OVER';
  if(inG){
    // 遊戲進行中：顯示暫停/停止按鈕
    const ph=mInR(BP);
    drawBtn(...BP,ph?[50,210,80]:[180,250,190],state==='PAUSED'?'繼續':'暫停',F_SM,'#000',8);
    const sh=mInR(BS);
    drawBtn(...BS,sh?[255,105,180]:[255,200,220],'停止',F_SM,'#000',8);
  }
  if(inMenu){
    // 選單畫面：顯示切換方向鍵按鈕與使用手勢按鈕
    const switchCol = useGesture ? [100,100,100] : [100,180,230];
    const gestureCol = useGesture ? [100,180,230] : [100,100,100];
    drawBtn(...BSWITCH,switchCol,'切換方向鍵',F_SM,'#000',8);
    drawBtn(...BGESTURE,gestureCol,'使用手勢',F_SM,'#000',8);
  }
  // Speed buttons: 選單顯示
  if (state === 'START' || state === 'GAME_OVER') {
    [[B05,.5,'0.5倍'],[B10,1.0,'1.0倍'],[B15,1.5,'1.5倍']].forEach(([btn,m,txt])=>{
      const sel=speedMult===m,hov=mInR(btn);
      drawBtn(...btn,sel?[255,200,0]:hov?[0,180,255]:[180,230,255],txt,F_SM,'#000',8);
    });
  } else if (state === 'PLAYING' || state === 'PAUSED') {
    let autoSpeedMult = 1.0;
    if (player.score >= 701) autoSpeedMult = 1.5;
    else if (player.score >= 501) autoSpeedMult = 1.4;
    else if (player.score >= 301) autoSpeedMult = 1.3;
    else if (player.score >= 201) autoSpeedMult = 1.2;
    else if (player.score >= 101) autoSpeedMult = 1.1;
    let actualSpeed = speedMult * autoSpeedMult;
    if (player.speedTimer > 0) actualSpeed = (actualSpeed < 1.0) ? 0.5 : 1.0;
    let speedText = `實際倍速: ${actualSpeed.toFixed(2)}`;
    drawOutlined(speedText, 'bold ' + F_SM, '#fff', 140, 25, 4, 6, '#000', '#fff', 1, 0, '#000', 'left');
  }
}

function drawFrame(){
  ctx.clearRect(0,0,GW,GH);
  drawBg();

  if(state==='START'){
    drawTopSpikes(0);
    const ta=((Date.now()%2000)/2000)*(242/255);
    drawOutlined('球球大冒險',F_LG,'#000',GW/2,GH/3,4,9,'#fff','#000',ta);
    if(mInR([GW/2-80,btnSY,160,60]))selIdx=0; if(mInR([GW/2-80,btnFY,160,60]))selIdx=1;
    drawBtn(GW/2-80,btnSY,160,60,[[139,0,0],[255,102,102]],'開始挑戰',selIdx===0?F_MED_B:F_MED,'#fff',15);
    drawBtn(GW/2-80,btnFY,160,60,[[0,100,0],[144,238,144]],'飛高高吧',selIdx===1?F_MED_B:F_MED,'#fff',15);
    drawTopBarUI();

  } else if(state==='PLAYING'||state==='PAUSED'){
    platforms.forEach(p=>p.draw());
    player.draw();
    const sa=spikeFlash>0?Math.max(0,Math.min(255,Math.round((spikeFlash/.2)*255))):0;
    drawTopSpikes(sa);
    drawHpBar(); drawScoreUI(); drawTopBarUI();
    if(state==='PAUSED'){
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,GW,GH);
      ctx.font=F_LG;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';ctx.fillText('遊戲暫停',GW/2,GH/2);
    }

  } else if(state === 'GAME_OVER'){
    drawTopSpikes(0);
    drawOutlined('遊戲結束',F_LG,[[0,0,139],[221,160,221]],GW/2,GH/3,4,9,'#fff','#800080',1);
    
    let scoreBody, scoreOut1, scoreOut2;
    if (gameMode === 'fly') {
      scoreBody = [[0,100,0], [144,238,144]];
      scoreOut1 = '#fff';
      scoreOut2 = '#006400';
    } else {
      scoreBody = [[139,0,0],[255,128,128]];
      scoreOut1 = '#fff';
      scoreOut2 = '#8B0000';
    }
    const speedChanged = speedMult !== startingSpeedMult;
    drawOutlined(`獲得分數: `,F_LG,scoreBody,GW/2+90,GH/2,8,14,scoreOut1,scoreOut2,1,0,'#000','right');
    drawOutlined(`${speedChanged ? '---' : player.score}`,F_LG,scoreBody,GW/2+90,GH/2,8,14,scoreOut1,scoreOut2,1,0,'#000','left');
    if (!speedChanged && player.score === 0) {
      drawOutlined(`放鬆一下, 加油!`,F_HALF_LG,scoreBody,GW/2,GH/2+60,4,7,scoreOut1,scoreOut2,1);
    } else {
      drawStarRating(GW/2, GH/2+60, speedChanged ? 0 : gameRating, 1);
    }

    if(mInR([GW/2-80,btnSY,160,60]))selIdx=0; if(mInR([GW/2-80,btnFY,160,60]))selIdx=1;
    let colorSY = selIdx === 0 ? [[0,0,255],[128,0,255]] : [[0,0,139],[128,0,128]];
    let colorFY = selIdx === 1 ? [[0,0,255],[128,0,255]] : [[0,0,139],[128,0,128]];
    drawBtn(GW/2-80,btnSY,160,60,colorSY,'繼續挑戰',selIdx===0?F_MED_B:F_MED,'#fff',15);
    drawBtn(GW/2-80,btnFY,160,60,colorFY,'回到首頁',selIdx===1?F_MED_B:F_MED,'#fff',15);
    drawTopBarUI();
  }
}

/* ═══════════════════════ TICK SOUND ENGINE ═══════════════════════ */
let tickAcc = 0; // 累積時間，用於控制滴答節奏

// 根據剩餘時間計算滴答間隔（秒）
// invertTimer 最大值為 10 秒
// >5秒：1.0秒/拍；3~5秒：0.6秒/拍；1~3秒：0.35秒/拍；<1秒：0.18秒/拍（急促）
function getTickInterval(remainSec){
  if(remainSec > 5) return 1.0;
  if(remainSec > 3) return 0.6;
  if(remainSec > 1) return 0.35;
  return 0.18;
}

/* ═══════════════════════ MAIN LOOP ═══════════════════════ */
let lastT=0, acc=0;
const STEP=1/60;

function loop(ts){
  const dt=Math.min((ts-lastT)/1000,.05);
  lastT=ts; 
  if(!isTimeRestricted){
    player.score = Math.min(99999, player.score);
    let autoSpeedMult = 1.0;
    if (player.score >= 701) autoSpeedMult = 1.5;
    else if (player.score >= 501) autoSpeedMult = 1.4;
    else if (player.score >= 301) autoSpeedMult = 1.3;
    else if (player.score >= 201) autoSpeedMult = 1.2;
    else if (player.score >= 101) autoSpeedMult = 1.1;

    let baseSpeed = speedMult * autoSpeedMult;
    let currentSpeed = baseSpeed;
    if (player.speedTimer > 0) {
      currentSpeed = baseSpeed < 1.0 ? 0.5 : 1.0;
    }
    acc+=dt*currentSpeed;
    let steps=0;
    while(acc>=STEP&&steps<4){updateGame();acc-=STEP;steps++;}
  }

  // ── 滴答音效控制 ──
  // 僅在遊戲進行中且 invertTimer 倒數中時播放
  if(state==='PLAYING' && player && player.invertTimer > 0 && SFX.tick){
    tickAcc += dt;
    const interval = getTickInterval(player.invertTimer);
    if(tickAcc >= interval){
      tickAcc = tickAcc % interval; // 保持餘數，避免累積漂移
      playBuf(SFX.tick);
    }
  } else {
    // 倒數結束或停止計數：重置累積，下次重新從頭計時
    tickAcc = 0;
  }

  drawFrame();
  requestAnimationFrame(loop);
}

/* ═══════════════════════ TIME LIMIT MECHANISM ═══════════════════════ */
function getPassword() {
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const hh = String(now.getHours()).padStart(2, '0');
  return `${yyyy}${mm}${dd}${hh}`;
}

function triggerTimeRestriction() {
  isTimeRestricted = true;
  document.getElementById('time-limit-overlay').style.display = 'flex';
  document.getElementById('time-limit-input').value = '';
  document.getElementById('time-limit-input').focus();
  if (AC && AC.state === 'running') {
    AC.suspend();
  }
}

// Check time limit every 1 second
setInterval(() => {
  if (!isTimeRestricted && (Date.now() - pageStartTime >= limitMs)) {
    triggerTimeRestriction();
  }
}, 1000);

document.getElementById('time-limit-confirm').addEventListener('click', () => {
  const inputVal = document.getElementById('time-limit-input').value.trim();
  if (inputVal === getPassword()) {
    isTimeRestricted = false;
    document.getElementById('time-limit-overlay').style.display = 'none';
    pageStartTime = Date.now(); // Reset time limit timer
    if (AC && AC.state === 'suspended') {
      AC.resume();
    }
  } else {
    const inputEl = document.getElementById('time-limit-input');
    inputEl.style.borderColor = '#f72585';
    inputEl.value = '';
    inputEl.placeholder = '密碼錯誤，請重新輸入';
    setTimeout(() => {
      inputEl.style.borderColor = '';
    }, 1000);
  }
});

document.getElementById('time-limit-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    document.getElementById('time-limit-confirm').click();
  }
});

document.getElementById('time-limit-leave').addEventListener('click', () => {
  window.close();
  document.body.innerHTML = `
    <div style="
      width: 100%; height: 100%; 
      background: #080818; color: #fff; 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif; text-align: center; padding: 20px;
    ">
      <h2 style="color: #ffb703; margin-bottom: 15px; font-size: 24px;">遊戲已關閉</h2>
      <p style="font-size: 16px; color: rgba(255,255,255,0.7); margin-bottom: 5px;">可愛的小眼睛，好好休息吧！👀✨</p>
      <p style="font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 15px;">（您可以安全地關閉此瀏覽器分頁）</p>
    </div>
  `;
});

resetGame('normal');
requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(loop);});
// Score overlay logic
let promptRecordIndex = 0;
let recordFlowState = 'NONE'; // NONE | WAIT_PROMPT | PROMPT | INPUT | RANK
function updatePromptRecordUI() {
  const btnYes = document.getElementById('score-prompt-yes');
  const btnNo = document.getElementById('score-prompt-no');
  if(promptRecordIndex === 0) {
    btnYes.style.transform = 'scale(1.05)';
    btnYes.style.boxShadow = '0 0 10px rgba(255,255,255,0.5)';
    btnNo.style.transform = 'scale(1)';
    btnNo.style.boxShadow = 'none';
  } else {
    btnNo.style.transform = 'scale(1.05)';
    btnNo.style.boxShadow = '0 0 10px rgba(255,255,255,0.5)';
    btnYes.style.transform = 'scale(1)';
    btnYes.style.boxShadow = 'none';
  }
}

function showTop20(mode) {
  let prevMode = gameMode;
  gameMode = mode;
  let scores = loadScores();
  gameMode = prevMode;

  const modeLabel = mode === 'fly' ? '【飛高高吧】' : '【開始挑戰】';
  document.getElementById('score-rank-title').innerText = modeLabel + " 本次排名: ---";
  let listHtml = "";
  for(let i=0; i<Math.min(20, scores.length); i++) {
    let m = scores[i].multiplier !== undefined ? scores[i].multiplier : 1.0;
    let s = scores[i].stars !== undefined ? scores[i].stars : 0;
    let colorStyle = "color: #FFF;";
    let fontSizeStyle = "font-size: 13px;";
    let fontWeight = i < 3 ? "font-weight: bold;" : "";
    listHtml += `<div style="${colorStyle} ${fontSizeStyle} ${fontWeight} margin: 2px 0; width: max-content; padding-right: 20px;">Top.${i+1} - 名字: ${scores[i].id} / 分數: ${scores[i].score} / 倍數: ${m} / 星數: ${s}</div>`;
  }
  document.getElementById('score-rank-list').innerHTML = listHtml;
  document.getElementById('score-rank-overlay').style.display = 'flex';
  recordFlowState = 'RANK';
}

function getScoresKey() {
  return gameMode === 'fly' ? 'boy_walk_down_scores_fly' : 'boy_walk_down_scores';
}
function loadScores() {
  try {
    const data = localStorage.getItem(getScoresKey());
    if (data) return JSON.parse(data);
  } catch(e) {}
  return [];
}
function saveScores(scores) {
  try {
    localStorage.setItem(getScoresKey(), JSON.stringify(scores));
  } catch(e) {}
}

document.getElementById('score-prompt-yes').addEventListener('click', () => {
  document.getElementById('score-prompt-overlay').style.display = 'none';
  recordFlowState = 'INPUT';
  document.getElementById('score-input-text').value = '';
  document.getElementById('score-input-overlay').style.display = 'flex';
  document.getElementById('score-input-text').focus();
});

document.getElementById('score-prompt-no').addEventListener('click', () => {
  document.getElementById('score-prompt-overlay').style.display = 'none';
  recordFlowState = 'NONE';
});

document.getElementById('score-input-confirm').addEventListener('click', () => {
  const inputEl = document.getElementById('score-input-text');
  let id = inputEl.value.trim();
  if(!id) id = "Unknown";
  
  let scores = loadScores();
  scores.push({id: id, score: player.score, multiplier: startingSpeedMult, stars: gameRating});
  scores.sort((a,b) => b.score - a.score);
  saveScores(scores);
  
  let rank = -1;
  for(let i=0; i<scores.length; i++) {
    if(scores[i].id === id && scores[i].score === player.score) {
      rank = i + 1;
      break;
    }
  }
  
  document.getElementById('score-input-overlay').style.display = 'none';
  recordFlowState = 'RANK';
  
  const modeLabel = gameMode === 'fly' ? '【飛高高吧】' : '【開始挑戰】';
  document.getElementById('score-rank-title').innerText = modeLabel + " 本次排名: 第 " + rank + " 名";
  let listHtml = "";
  for(let i=0; i<Math.min(20, scores.length); i++) {
    let m = scores[i].multiplier !== undefined ? scores[i].multiplier : 1.0;
    let s = scores[i].stars !== undefined ? scores[i].stars : 0;
    let isCurrent = (rank > 0 && i === rank - 1);
    let colorStyle = isCurrent ? "" : "color: #FFF;";
    let fontSizeStyle = isCurrent ? "" : "font-size: 13px;";
    let idAttr = isCurrent ? "id='current-record-item'" : "";
    let fontWeight = (isCurrent || i < 3) ? "font-weight: bold;" : "";
    let rowClass = isCurrent ? "class='record-glow'" : "";
    listHtml += `<div ${idAttr} ${rowClass} style="${colorStyle} ${fontSizeStyle} ${fontWeight} margin: 2px 0; width: max-content; padding-right: 20px;">Top.${i+1} - 名字: ${scores[i].id} / 分數: ${scores[i].score} / 倍數: ${m} / 星數: ${s}</div>`;
  }
  document.getElementById('score-rank-list').innerHTML = listHtml;
  document.getElementById('score-rank-overlay').style.display = 'flex';
  const currentItem = document.getElementById('current-record-item');
  if (currentItem) {
    setTimeout(() => {
      currentItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }
});

document.getElementById('score-input-text').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === 'NumpadEnter') {
    e.stopPropagation();
    document.getElementById('score-input-confirm').click();
  }
});

document.getElementById('score-rank-continue').addEventListener('click', () => {
  document.getElementById('score-rank-overlay').style.display = 'none';
  recordFlowState = 'NONE';
});

document.addEventListener('keydown', (e) => {
  if (recordFlowState === 'RANK' && (e.key === 'Enter' || e.key === 'NumpadEnter')) {
    e.stopPropagation();
    document.getElementById('score-rank-continue').click();
  }
});
